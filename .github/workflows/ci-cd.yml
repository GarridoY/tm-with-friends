name: CI/CD

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      iac: ${{ steps.filter.outputs.iac }}
      other: ${{ steps.filter.outputs.other }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iac:
              - 'iac/**'
            other:
              - '**'
              - '!iac/**'
          predicate-quantifier: some

  opentofu-validate:
    name: Validate IaC
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.iac == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache OpenTofu providers
        uses: actions/cache@v6
        with:
          path: iac/.terraform
          key: tofu-${{ hashFiles('iac/.terraform.lock.hcl') }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: OpenTofu fmt
        run: tofu fmt -check
        continue-on-error: true

      - name: OpenTofu init
        working-directory: iac
        run: |
          tofu init -input=false

      - name: OpenTofu validate
        working-directory: iac
        run: |
          tofu validate

  docker:
    name: Build and push Docker image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.other == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare sanitized ref
        id: prep
        run: |
          ref=${GITHUB_REF#refs/heads/}
          ref=${ref//\//-}
          echo "sanitized_ref=$ref" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            garridoy/tm-with-friends:${{ github.sha }}
            garridoy/tm-with-friends:${{ steps.prep.outputs.sanitized_ref }}

  deploy:
    name: Deploy to production
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v7

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Cache OpenTofu providers
        uses: actions/cache@v6
        with:
          path: iac/.terraform
          key: tofu-${{ hashFiles('iac/.terraform.lock.hcl') }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: OpenTofu init
        working-directory: iac
        run: |
          tofu init -input=false

      - name: OpenTofu plan
        working-directory: iac
        env:
          TF_VAR_google_credentials: ${{ secrets.GOOGLE_CREDENTIALS }}
          TF_VAR_encoded_credentials: ${{ secrets.ENCODED_CREDENTIALS }}
          TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
          TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
        run: |
          IMAGE="garridoy/tm-with-friends:${{ github.sha }}"
          echo "Using image: $IMAGE"
          tofu plan -var="image=$IMAGE" -out=plan.tfplan

      - name: OpenTofu apply plan
        working-directory: iac
        env:
          TF_VAR_google_credentials: ${{ secrets.GOOGLE_CREDENTIALS }}
          TF_VAR_encoded_credentials: ${{ secrets.ENCODED_CREDENTIALS }}
          TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
          TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
        run: |
          tofu apply -input=false -auto-approve plan.tfplan

      - name: OpenTofu output and curl
        working-directory: iac
        run: |
          uri=$(tofu output -raw uri)
          echo "Service URI: $uri"
