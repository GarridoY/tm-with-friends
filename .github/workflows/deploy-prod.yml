name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Optional image to deploy (e.g. garridoy/tm-with-friends:sha). If empty, the `main` tag will be used.'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: 'actions/checkout@v6'

    - uses: 'google-github-actions/auth@v3'
      with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Terraform init
      working-directory: iac
      run: |
        terraform init -input=false

    - name: Terraform plan
      working-directory: iac
      env:
        TF_VAR_google_credentials: ${{ secrets.GOOGLE_CREDENTIALS }}
        TF_VAR_encoded_credentials: ${{ secrets.ENCODED_CREDENTIALS }}
        TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
        TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
      run: |
        IMAGE="${{ github.event.inputs.image }}"
        if [ -z "$IMAGE" ]; then
          IMAGE="docker.io/garridoy/tm-with-friends:main"
        fi
        echo "Using image: $IMAGE"
        terraform plan -var="image=$IMAGE" -out=plan.tfplan

    - name: Terraform apply plan
      working-directory: iac
      env:
        TF_VAR_google_credentials: ${{ secrets.GOOGLE_CREDENTIALS }}
        TF_VAR_encoded_credentials: ${{ secrets.ENCODED_CREDENTIALS }}
        TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
        TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
      run: |
        terraform apply -input=false -auto-approve plan.tfplan

    - name: Terraform output and curl
      working-directory: iac
      run: |
        uri=$(terraform output -raw uri)
        echo "Service URI: $uri"
